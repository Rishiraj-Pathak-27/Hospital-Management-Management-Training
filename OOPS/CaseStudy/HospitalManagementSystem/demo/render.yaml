services:
  - type: web
    name: hospital-demo
    env: docker
    plan: free
    buildCommand: ''
    startCommand: 'java -jar /app/app.jar'
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_SQL_INIT_MODE
        value: 'never'
      - key: HIKARI_INIT_FAIL_TIMEOUT
        value: '-1'
      - key: SERVER_ADDRESS
        value: '0.0.0.0'
      - key: PORT
        value: '10000'
