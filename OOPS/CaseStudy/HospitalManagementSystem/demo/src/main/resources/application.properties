spring.application.name=demo
server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Allow either DATABASE_URL (JDBC) or SPRING_DATASOURCE_URL; defaults kept for local MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/hmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:Root@1234}}

spring.datasource.hikari.maximum-pool-size=5
spring.sql.init.mode=never
spring.datasource.hikari.initialization-fail-timeout=-1