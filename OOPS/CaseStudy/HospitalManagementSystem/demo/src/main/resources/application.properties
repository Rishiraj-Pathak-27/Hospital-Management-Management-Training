spring.application.name=demo
server.port=${PORT:8080}
# Bind address configurable for platforms that require 0.0.0.0
server.address=${SERVER_ADDRESS:0.0.0.0}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hmsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:Root@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=5
# Allow overriding SQL initialization mode via env var for quick deploy troubleshooting
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
# If schema scripts fail, allow continuing (useful when DB not ready)
spring.sql.init.continue-on-error=${SPRING_SQL_INIT_CONTINUE_ON_ERROR:true}
# Prevent Hikari from failing fast if the DB is unreachable at startup (-1 disables fail-fast)
spring.datasource.hikari.initialization-fail-timeout=${HIKARI_INIT_FAIL_TIMEOUT:-1}
