server.port=8086
spring.application.name=patient-service

spring.datasource.url=${DB_URL:jdbc:postgresql://ep-bitter-night-aplfch4n-pooler.c-7.us-east-1.aws.neon.tech/patients?sslmode=require&channel_binding=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_hd9uN7RBQyne}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8085}

logging.level.root=WARN
logging.level.com.hospital.patient=INFO
logging.level.org.springframework.security=INFO

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.client.registry-fetch-interval-seconds=5

# Actuator configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
