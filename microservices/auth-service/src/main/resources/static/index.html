<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Service Tester</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --danger: #b91c1c;
      --ok: #047857;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #e8f5f2, #eef4ff);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    h1 {
      grid-column: 1 / -1;
      margin: 0 0 4px;
      font-size: 28px;
    }

    .subtitle {
      grid-column: 1 / -1;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 8px 0 6px;
      font-weight: 600;
      font-size: 13px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--brand);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button.secondary {
      background: #334155;
    }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 10px;
      min-height: 160px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      margin: 8px 0 0;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .status {
      font-size: 13px;
      margin-top: 8px;
      font-weight: 600;
    }

    .ok {
      color: var(--ok);
    }

    .err {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auth Service Test Page</h1>
    <p class="subtitle">Use this page to register, login, and validate JWT from your browser.</p>

    <section class="card">
      <h2>Register User</h2>
      <label for="regUser">Username</label>
      <input id="regUser" placeholder="john" />

      <label for="regPass">Password</label>
      <input id="regPass" type="password" placeholder="pass123" />

      <label for="regRole">Role</label>
      <select id="regRole">
        <option>PATIENT</option>
        <option>DOCTOR</option>
        <option>ADMIN</option>
      </select>

      <div class="row">
        <button id="registerBtn">Register</button>
      </div>
      <div id="regStatus" class="status"></div>
    </section>

    <section class="card">
      <h2>Login User</h2>
      <label for="loginUser">Username</label>
      <input id="loginUser" placeholder="john" />

      <label for="loginPass">Password</label>
      <input id="loginPass" type="password" placeholder="pass123" />

      <div class="row">
        <button id="loginBtn">Login</button>
      </div>
      <div id="loginStatus" class="status"></div>
      <p class="hint">Token is auto-filled below after successful login.</p>
    </section>

    <section class="card">
      <h2>Validate Token</h2>
      <label for="token">Bearer Token</label>
      <input id="token" placeholder="eyJhbGci..." />

      <div class="row">
        <button id="validateBtn">Validate</button>
        <button id="healthBtn" class="secondary">Health Check</button>
      </div>
      <div id="valStatus" class="status"></div>
    </section>

    <section class="card" style="grid-column: 1 / -1;">
      <h2>API Response</h2>
      <pre id="output">Ready</pre>
    </section>
  </div>

  <script>
    const output = document.getElementById("output");

    function showJson(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    function setStatus(id, message, ok) {
      const el = document.getElementById(id);
      el.className = "status " + (ok ? "ok" : "err");
      el.textContent = message;
    }

    async function callApi(url, options = {}) {
      const res = await fetch(url, options);
      let data;
      try {
        data = await res.json();
      } catch {
        data = { status: res.status, message: "No JSON body" };
      }
      showJson({ httpStatus: res.status, body: data });
      return { res, data };
    }

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const username = document.getElementById("regUser").value.trim();
      const password = document.getElementById("regPass").value;
      const role = document.getElementById("regRole").value;

      const { res, data } = await callApi("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, role })
      });

      if (res.ok) {
        setStatus("regStatus", "User registered and added to database", true);
        alert("Register success: user saved to DB");
        document.getElementById("loginUser").value = username;
        document.getElementById("loginPass").value = password;
      } else {
        setStatus("regStatus", data.error || data.message || "Register failed", false);
        alert("Register failed");
      }
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;

      const { res, data } = await callApi("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (res.ok && data.token) {
        document.getElementById("token").value = data.token;
        setStatus("loginStatus", "Login success. Token generated.", true);
        alert("Login success");
      } else {
        setStatus("loginStatus", data.error || data.message || "Login failed", false);
        alert("Login failed");
      }
    });

    document.getElementById("validateBtn").addEventListener("click", async () => {
      const token = document.getElementById("token").value.trim();
      const { res, data } = await callApi("/api/auth/validate", {
        method: "GET",
        headers: { Authorization: "Bearer " + token }
      });

      if (res.ok) {
        setStatus("valStatus", "Token is valid", true);
        alert("Token valid");
      } else {
        setStatus("valStatus", data.message || data.error || "Token invalid", false);
        alert("Token invalid");
      }
    });

    document.getElementById("healthBtn").addEventListener("click", async () => {
      const { res } = await callApi("/api/auth/health", { method: "GET" });
      if (res.ok) {
        alert("Service is UP");
      } else {
        alert("Service health check failed");
      }
    });
  </script>
</body>
</html>
